<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Modern dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <!-- Glowing accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)" />

  <!-- Animated network lines background -->
  <g opacity="0.25" stroke="url(#accent)" stroke-width="1.5">
    <path d="M 0 150 Q 250 50 500 150 T 1000 150" fill="none">
      <animate attributeName="d" values="M 0 150 Q 250 50 500 150 T 1000 150; M 0 150 Q 250 250 500 150 T 1000 150; M 0 150 Q 250 50 500 150 T 1000 150" dur="12s" repeatCount="indefinite" />
    </path>
    <path d="M 0 150 Q 250 200 500 150 T 1000 150" fill="none">
      <animate attributeName="d" values="M 0 150 Q 250 200 500 150 T 1000 150; M 0 150 Q 250 100 500 150 T 1000 150; M 0 150 Q 250 200 500 150 T 1000 150" dur="16s" repeatCount="indefinite" />
    </path>
    <path d="M 0 150 Q 250 100 500 150 T 1000 150" fill="none">
      <animate attributeName="d" values="M 0 150 Q 250 100 500 150 T 1000 150; M 0 150 Q 250 250 500 150 T 1000 150; M 0 150 Q 250 100 500 150 T 1000 150" dur="10s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Core Pulsing Rings -->
  <g transform="translate(500, 150)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="55; 65; 55" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0.2; 0.8" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#accent)" stroke-width="1" stroke-dasharray="3 8" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="35s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Typography -->
  <text x="500" y="142" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="4">SIHAN UDAYARATNA</text>
  <text x="500" y="172" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#94a3b8" text-anchor="middle" letter-spacing="8">BUILDER &amp; AI ENTHUSIAST</text>

  <!-- Floating Particles -->
  <g fill="#60a5fa" opacity="0.6">
    <circle cx="150" cy="80" r="2.5">
      <animate attributeName="cy" values="80; 65; 80" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="220" r="2">
      <animate attributeName="cy" values="220; 235; 220" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4; 1; 0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="230" r="3">
      <animate attributeName="cy" values="230; 210; 230" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 0.8; 0.2" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="70" r="2.5">
      <animate attributeName="cy" values="70; 85; 70" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 0.9; 0.3" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="180" r="1.5">
      <animate attributeName="cy" values="180; 195; 180" dur="4.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5; 1; 0.5" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="130" r="2">
      <animate attributeName="cy" values="130; 115; 130" dur="5.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 0.7; 0.2" dur="5.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
