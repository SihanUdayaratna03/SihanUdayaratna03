<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Deep Space Black Base -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Aurora Blur Filter for Fluid Gradients -->
    <filter id="aurora" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70" result="blur" />
    </filter>

    <!-- Professional Tech Dot Grid -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="rgba(255,255,255,0.07)" cx="2" cy="2" r="1"></circle>
    </pattern>

    <!-- Sleek Line Gradient for the Accent -->
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Solid Base -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Aurora Mesh Gradients (Fluid, cinematic AI aesthetic) -->
  <g filter="url(#aurora)" opacity="0.65">
    <!-- Deep Blue Orb -->
    <circle fill="#2563eb" cx="300" cy="150" r="160">
      <animate attributeName="cx" values="300; 600; 300" dur="14s" repeatCount="indefinite" />
      <animate attributeName="cy" values="150; 50; 150" dur="18s" repeatCount="indefinite" />
    </circle>
    <!-- Purple Orb -->
    <circle fill="#7c3aed" cx="700" cy="150" r="150">
      <animate attributeName="cx" values="700; 400; 700" dur="16s" repeatCount="indefinite" />
      <animate attributeName="cy" values="150; 250; 150" dur="20s" repeatCount="indefinite" />
    </circle>
    <!-- Cyan Orb -->
    <circle fill="#0891b2" cx="500" cy="50" r="130">
      <animate attributeName="cx" values="500; 200; 500" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50; 200; 50" dur="12s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Geometric Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#dots)" />

  <!-- Orbital Rings (Simulating Neural Parameters/AI Models) -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none">
    <circle cx="500" cy="150" r="220" stroke-dasharray="1 10">
      <animateTransform attributeName="transform" type="rotate" from="0 500 150" to="360 500 150" dur="60s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="150" r="260" stroke-dasharray="4 20">
      <animateTransform attributeName="transform" type="rotate" from="360 500 150" to="-360 500 150" dur="80s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Precision Crosshairs -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <line x1="500" y1="20" x2="500" y2="40" />
    <line x1="500" y1="260" x2="500" y2="280" />
    <line x1="20" y1="150" x2="40" y2="150" />
    <line x1="960" y1="150" x2="980" y2="150" />
  </g>

  <!-- Typography & Layout -->
  <g transform="translate(500, 150)">
    <!-- Main Name -->
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8">SIHAN UDAYARATNA</text>
    
    <!-- Title -->
    <text x="0" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="12">AI &amp; MACHINE LEARNING ENGINEER</text>
    
    <!-- Glowing Accent Line under text -->
    <rect x="-180" y="55" width="360" height="2" fill="url(#line-glow)">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
