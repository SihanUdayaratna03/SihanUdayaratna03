<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="100%" stop-color="#0b0d1a"/>
    </linearGradient>

    <!-- Active trace gradient (blue to indigo) -->
    <linearGradient id="trace-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Horizontal data packet animation -->
    <style>
      @keyframes ltr { from { stroke-dashoffset: 600; } to { stroke-dashoffset: -600; } }
      @keyframes rtl { from { stroke-dashoffset: -600; } to { stroke-dashoffset: 600; } }
      @keyframes pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.9; } }
      @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      
      .t { fill: none; stroke: #1e2d4a; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .n { fill: #060912; stroke: #1e2d4a; stroke-width: 1.5; }
      .n-active { fill: #0ea5e9; }
      
      .d1 { fill:none; stroke:#38bdf8; stroke-width:2; stroke-linecap:round; stroke-dasharray:20 600; animation: ltr 3.2s linear infinite; }
      .d2 { fill:none; stroke:#818cf8; stroke-width:2; stroke-linecap:round; stroke-dasharray:15 600; animation: ltr 4.5s linear infinite; }
      .d3 { fill:none; stroke:#38bdf8; stroke-width:2; stroke-linecap:round; stroke-dasharray:20 600; animation: rtl 3.8s linear infinite; }
      .d4 { fill:none; stroke:#818cf8; stroke-width:2; stroke-linecap:round; stroke-dasharray:12 600; animation: rtl 5.1s linear infinite; }
      .d5 { fill:none; stroke:#38bdf8; stroke-width:2; stroke-linecap:round; stroke-dasharray:18 600; animation: ltr 2.9s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  LEFT SIDE CIRCUIT BLOCK                    -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Bus cluster 1: top-left angling down -->
  <path class="t" d="M0,45 H90 L140,95 H220"/>
  <path class="t" d="M0,58 H80 L130,108 H200"/>
  <path class="t" d="M0,71 H70 L120,121 H195"/>
  <path class="t" d="M0,84 H60 L110,134 H188"/>

  <!-- Bus cluster 2: middle-left going straight then up -->
  <path class="t" d="M0,155 H100 L145,110 H230"/>
  <path class="t" d="M0,168 H95 L140,123 H215"/>
  <path class="t" d="M0,181 H90 L135,136 H210"/>

  <!-- Bus cluster 3: bottom-left angling up -->
  <path class="t" d="M0,240 H110 L150,200 H240"/>
  <path class="t" d="M0,253 H105 L145,213 H235"/>
  <path class="t" d="M0,266 H100 L140,226 H230"/>

  <!-- Active data packets LEFT -->
  <path class="d1" d="M0,45 H90 L140,95 H220"/>
  <path class="d2" d="M0,168 H95 L140,123 H215"/>
  <path class="d5" d="M0,253 H105 L145,213 H235"/>

  <!-- Endpoint nodes LEFT -->
  <circle class="n" cx="220" cy="95" r="4"/>
  <circle class="n" cx="200" cy="108" r="4"/>
  <circle class="n" cx="195" cy="121" r="4"/>
  <circle class="n" cx="188" cy="134" r="4"/>
  <circle class="n" cx="230" cy="110" r="4"/>
  <circle class="n" cx="215" cy="123" r="4"/>
  <circle class="n" cx="210" cy="136" r="4"/>
  <circle class="n" cx="240" cy="200" r="4"/>
  <circle class="n" cx="235" cy="213" r="4"/>
  <circle class="n" cx="230" cy="226" r="4"/>

  <!-- Active endpoint nodes (glowing) -->
  <circle cx="220" cy="95" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="215" cy="123" r="3" fill="#818cf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="235" cy="213" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/></circle>

  <!-- ═══════════════════════════════════════════ -->
  <!--  RIGHT SIDE CIRCUIT BLOCK                   -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Bus cluster 1: top-right angling down -->
  <path class="t" d="M1000,35 H910 L860,85 H780"/>
  <path class="t" d="M1000,48 H920 L870,98 H800"/>
  <path class="t" d="M1000,61 H930 L880,111 H810"/>
  <path class="t" d="M1000,74 H940 L890,124 H820"/>

  <!-- Bus cluster 2: middle-right straight then down -->
  <path class="t" d="M1000,160 H900 L855,115 H770"/>
  <path class="t" d="M1000,173 H905 L860,128 H785"/>
  <path class="t" d="M1000,186 H910 L865,141 H790"/>

  <!-- Bus cluster 3: bottom-right angling up -->
  <path class="t" d="M1000,235 H890 L850,195 H760"/>
  <path class="t" d="M1000,248 H895 L855,208 H765"/>
  <path class="t" d="M1000,261 H900 L860,221 H770"/>

  <!-- Active data packets RIGHT -->
  <path class="d3" d="M1000,48 H920 L870,98 H800"/>
  <path class="d4" d="M1000,173 H905 L860,128 H785"/>
  <path class="d3" d="M1000,248 H895 L855,208 H765"/>

  <!-- Endpoint nodes RIGHT -->
  <circle class="n" cx="780" cy="85" r="4"/>
  <circle class="n" cx="800" cy="98" r="4"/>
  <circle class="n" cx="810" cy="111" r="4"/>
  <circle class="n" cx="820" cy="124" r="4"/>
  <circle class="n" cx="770" cy="115" r="4"/>
  <circle class="n" cx="785" cy="128" r="4"/>
  <circle class="n" cx="790" cy="141" r="4"/>
  <circle class="n" cx="760" cy="195" r="4"/>
  <circle class="n" cx="765" cy="208" r="4"/>
  <circle class="n" cx="770" cy="221" r="4"/>

  <!-- Active endpoint nodes (glowing) -->
  <circle cx="800" cy="98" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="785" cy="128" r="3" fill="#818cf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="765" cy="208" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>

  <!-- ═══════════════════════════════════════════ -->
  <!--  HORIZONTAL ACCENT LINES                    -->
  <!-- ═══════════════════════════════════════════ -->
  <path class="t" d="M0,130 H260"/>
  <path class="t" d="M740,130 H1000"/>
  <path class="t" d="M0,170 H260"/>
  <path class="t" d="M740,170 H1000"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  SLIM TOP & BOTTOM EDGE ACCENT LINES        -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="0" y1="0" x2="1000" y2="0" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="299" x2="1000" y2="299" stroke="#818cf8" stroke-width="2" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  CENTRAL TEXT AREA                          -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Subtle vertical separator lines -->
  <line x1="285" y1="80" x2="285" y2="220" stroke="#1e2d4a" stroke-width="1"/>
  <line x1="715" y1="80" x2="715" y2="220" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Corner bracket accents (top-left and bottom-right of text area) -->
  <path d="M295,88 H310 V103" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <path d="M705,88 H690 V103" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <path d="M295,212 H310 V197" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
  <path d="M705,212 H690 V197" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>

  <!-- Name -->
  <text x="500" y="150" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="5"
        fill="url(#text-grad)">SIHAN UDAYARATNA</text>

  <!-- Subtitle divider -->
  <line x1="340" y1="168" x2="660" y2="168" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Role subtitle -->
  <text x="500" y="190" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="500" letter-spacing="5"
        fill="#475569">AI &amp; MACHINE LEARNING ENGINEER</text>
</svg>
