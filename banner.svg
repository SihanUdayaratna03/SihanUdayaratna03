<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
  <defs>
    <!-- Deep tech background matching the provided image -->
    <radialGradient id="bg" cx="60%" cy="50%" r="75%" fx="60%" fy="50%">
      <stop offset="0%" stop-color="#082f49" />  <!-- Dark cyan/blue glow in center-right -->
      <stop offset="100%" stop-color="#020617" /> <!-- Almost black edges -->
    </radialGradient>

    <!-- Cyan to deep blue for head outline -->
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Fade out for data streams moving to the right -->
    <linearGradient id="stream-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="strong-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Accurate human head profile facing right -->
    <path id="head-profile" d="M 120 30
      C 160 30, 190 50, 200 80
      C 205 90, 210 95, 210 100
      C 210 105, 200 110, 200 110
      C 200 110, 215 125, 230 140
      C 235 145, 220 150, 215 150
      C 215 150, 225 155, 225 160
      C 225 165, 210 165, 210 165
      C 210 165, 225 170, 225 170
      C 225 175, 215 180, 215 180
      C 215 180, 230 190, 230 200
      C 230 215, 200 230, 190 250
      C 185 260, 190 300, 190 350
      L -20 350
      C -20 300, 10 250, 20 180
      C 30 100, 70 30, 120 30 Z" />

    <clipPath id="head-clip">
      <use href="#head-profile" />
    </clipPath>
  </defs>

  <!-- Background Layer -->
  <rect width="1000" height="350" fill="url(#bg)" />

  <!-- Background Data Streams (Shooting from head) -->
  <g stroke="url(#stream-fade)" stroke-linecap="round" filter="url(#glow)">
    <!-- Fast streams -->
    <line x1="200" y1="135" x2="900" y2="135" stroke-width="1.5" stroke-dasharray="80 200" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="280; 0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="220" y1="190" x2="950" y2="190" stroke-width="2" stroke-dasharray="100 250" opacity="0.9">
      <animate attributeName="stroke-dashoffset" values="350; 0" dur="1.5s" repeatCount="indefinite" />
    </line>
    <line x1="185" y1="270" x2="800" y2="270" stroke-width="1" stroke-dasharray="50 150" opacity="0.5">
      <animate attributeName="stroke-dashoffset" values="200; 0" dur="2.5s" repeatCount="indefinite" />
    </line>
    <line x1="210" y1="100" x2="850" y2="100" stroke-width="2" stroke-dasharray="60 180" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="240; 0" dur="2.2s" repeatCount="indefinite" />
    </line>
    <!-- Slow streams -->
    <line x1="190" y1="80" x2="750" y2="80" stroke-width="1.5" stroke-dasharray="40 300" opacity="0.6">
      <animate attributeName="stroke-dashoffset" values="340; 0" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="210" y1="210" x2="850" y2="210" stroke-width="2" stroke-dasharray="120 400" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="520; 0" dur="3.5s" repeatCount="indefinite" />
    </line>
    <!-- Ambient static streams (fading out) -->
    <line x1="160" y1="60" x2="600" y2="60" stroke-width="1" opacity="0.4" />
    <line x1="200" y1="110" x2="700" y2="110" stroke-width="1.5" opacity="0.5" />
    <line x1="210" y1="155" x2="950" y2="155" stroke-width="1" opacity="0.3" />
    <line x1="215" y1="175" x2="800" y2="175" stroke-width="2" opacity="0.4" />
    <line x1="195" y1="225" x2="900" y2="225" stroke-width="1" opacity="0.3" />
    <line x1="180" y1="290" x2="650" y2="290" stroke-width="1.5" opacity="0.3" />
    <line x1="195" y1="250" x2="750" y2="250" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Animated Binary Text Streams -->
  <g font-family="monospace" font-size="13" fill="#22d3ee" font-weight="bold" filter="url(#glow)">
    <text y="104">1
      <animate attributeName="x" values="210; 800" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="2.2s" repeatCount="indefinite" />
    </text>
    <text y="140">0
      <animate attributeName="x" values="200; 900" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="2s" repeatCount="indefinite" />
    </text>
    <text y="195">1
      <animate attributeName="x" values="220; 950" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="1.5s" repeatCount="indefinite" />
    </text>
    <text y="215">0
      <animate attributeName="x" values="210; 850" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="3.5s" repeatCount="indefinite" />
    </text>
    <text y="274">1
      <animate attributeName="x" values="185; 750" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" repeatCount="indefinite" />
    </text>
    <!-- Static scattered binary to the right side fading out -->
    <text x="400" y="85" opacity="0.6">0</text>
    <text x="550" y="115" opacity="0.4">1</text>
    <text x="650" y="130" opacity="0.3">0</text>
    <text x="480" y="150" opacity="0.7">1</text>
    <text x="750" y="185" opacity="0.2">0</text>
    <text x="450" y="230" opacity="0.5">1</text>
    <text x="600" y="280" opacity="0.3">0</text>
    <text x="350" y="250" opacity="0.7">1</text>
  </g>

  <!-- Head Outline -->
  <use href="#head-profile" fill="none" stroke="url(#cyan-glow)" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>

  <!-- Inside the Head -->
  <g clip-path="url(#head-clip)">
    <!-- Dense Circuit lines inside the head -->
    <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#glow)">
      <!-- Horizontal lines -->
      <path d="M 0 80 L 80 80 L 110 110 L 160 110 L 180 130 L 200 130" />
      <path d="M 0 120 L 70 120 L 90 100 L 150 100 L 170 80 L 190 80" />
      <path d="M 0 160 L 100 160 L 120 140 L 160 140 L 180 160 L 220 160" />
      <path d="M 0 200 L 60 200 L 90 230 L 150 230 L 170 210 L 210 210" />
      <path d="M 0 240 L 80 240 L 110 210 L 140 210 L 160 190 L 230 190" />
      <path d="M 0 280 L 120 280 L 150 250 L 190 250 L 200 240" />
      <path d="M 0 320 L 100 320 L 130 290 L 170 290" />
      
      <!-- Vertical/Diagonal connectors -->
      <path d="M 80 80 L 80 120" />
      <path d="M 110 110 L 110 160" />
      <path d="M 150 100 L 150 140" />
      <path d="M 90 230 L 90 280" />
      <path d="M 160 140 L 160 190" />
      <path d="M 130 290 L 130 320" />
      <path d="M 140 210 L 140 250" />
    </g>

    <!-- Glowing Nodes (Circles) inside the head -->
    <g fill="#22d3ee" filter="url(#strong-glow)">
      <!-- Large nodes -->
      <circle cx="110" cy="110" r="4.5" />
      <circle cx="170" cy="80" r="5" />
      <circle cx="150" cy="140" r="6" />
      <circle cx="200" cy="130" r="3.5" />
      <circle cx="90" cy="230" r="4.5" />
      <circle cx="140" cy="210" r="5" />
      <circle cx="160" cy="190" r="3.5" />
      <circle cx="150" cy="250" r="4.5" />
      <circle cx="130" cy="290" r="4" />
      <!-- Pulsing core node (The "Brain/Core") -->
      <circle cx="120" cy="150" r="7">
        <animate attributeName="r" values="7; 10; 7" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7; 1; 0.7" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Dense Scattered Binary inside the head -->
    <g font-family="monospace" font-size="11" fill="#06b6d4" opacity="0.5" font-weight="bold">
      <text x="30" y="70">01011</text>
      <text x="100" y="60">101</text>
      <text x="50" y="90">110010</text>
      <text x="130" y="90">01</text>
      <text x="30" y="110">0010</text>
      <text x="70" y="130">1101101</text>
      <text x="170" y="120">10</text>
      <text x="30" y="150">10110010</text>
      <text x="130" y="170">0101</text>
      <text x="180" y="150">11</text>
      <text x="40" y="190">001101</text>
      <text x="110" y="190">10101</text>
      <text x="60" y="220">1100</text>
      <text x="130" y="230">01101</text>
      <text x="170" y="200">10</text>
      <text x="50" y="260">101001</text>
      <text x="120" y="270">001</text>
      <text x="90" y="290">11010</text>
      <text x="40" y="310">010</text>
      <text x="80" y="330">10011</text>
    </g>
  </g>

  <!-- Typography Overlay on the Right -->
  <g transform="translate(620, 165)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">SIHAN UDAYARATNA</text>
    <text x="0" y="32" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#22d3ee" text-anchor="middle" letter-spacing="8" filter="url(#glow)">AI &amp; MACHINE LEARNING</text>
  </g>
</svg>
