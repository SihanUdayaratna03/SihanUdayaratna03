<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing Cyan -->
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- CPU Box Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Deep Glow for Active Circuits -->
    <filter id="circuit-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.06)" />
      <path d="M 40 0 L 40 40 L 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    </pattern>

    <style>
      .circuit { fill: none; stroke: rgba(56, 189, 248, 0.2); stroke-width: 2; stroke-linejoin: bevel; stroke-linecap: round; }
      
      .node { fill: #020617; stroke: rgba(56, 189, 248, 0.4); stroke-width: 1.5; }
      .node-main { fill: #020617; stroke: #0ea5e9; stroke-width: 2; }
      .node-pulse { fill: #38bdf8; }
      
      @keyframes dash {
        to { stroke-dashoffset: -1000; }
      }
      .circuit-active {
        fill: none; stroke: #38bdf8; stroke-width: 2.5; stroke-linecap: round;
        stroke-dasharray: 10 150; stroke-dashoffset: 0;
        animation: dash 4s linear infinite;
        filter: url(#circuit-glow);
      }
      .circuit-active-slow {
        fill: none; stroke: #8b5cf6; stroke-width: 2.5; stroke-linecap: round;
        stroke-dasharray: 15 200; stroke-dashoffset: 0;
        animation: dash 6s linear infinite;
        filter: url(#circuit-glow);
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Background Binary Decor -->
  <g font-family="monospace" font-size="11" fill="rgba(56, 189, 248, 0.12)" letter-spacing="2">
    <text x="30" y="40">AI_CORE_INIT: OK</text>
    <text x="30" y="60">MEM: 0x8F9B2C</text>
    <text x="30" y="260">SYS.PROCESS(1)</text>
    
    <text x="840" y="40">NET_UPLINK: LIVE</text>
    <text x="840" y="60">BW: 10.4 TB/s</text>
    <text x="840" y="260">ML_MODEL: V4.2</text>
  </g>

  <!-- CPU Box Base -->
  <rect x="220" y="70" width="560" height="160" fill="#020617" stroke="rgba(14, 165, 233, 0.5)" stroke-width="2" rx="8" />

  <!-- CPU Pins Top & Bottom -->
  <line x1="240" y1="64" x2="760" y2="64" stroke="rgba(56, 189, 248, 0.6)" stroke-width="6" stroke-dasharray="4 16" />
  <line x1="240" y1="236" x2="760" y2="236" stroke="rgba(56, 189, 248, 0.6)" stroke-width="6" stroke-dasharray="4 16" />
  
  <!-- CPU Pins Left & Right -->
  <line x1="214" y1="90" x2="214" y2="210" stroke="rgba(56, 189, 248, 0.6)" stroke-width="6" stroke-dasharray="4 16" />
  <line x1="786" y1="90" x2="786" y2="210" stroke="rgba(56, 189, 248, 0.6)" stroke-width="6" stroke-dasharray="4 16" />

  <!-- Passive Circuits -->
  <!-- Left Side -->
  <path class="circuit" d="M -20 100 H 120 V 120 H 210" />
  <path class="circuit" d="M -20 160 H 150 V 180 H 210" />
  <path class="circuit" d="M -20 220 H 90 V 200 H 210" />
  <!-- Top Side -->
  <path class="circuit" d="M 280 -20 V 40 H 320 V 60" />
  <path class="circuit" d="M 650 -20 V 50 H 700 V 60" />
  <!-- Right Side -->
  <path class="circuit" d="M 1020 90 H 880 V 120 H 790" />
  <path class="circuit" d="M 1020 150 H 850 V 170 H 790" />
  <path class="circuit" d="M 1020 210 H 920 V 190 H 790" />
  <!-- Bottom Side -->
  <path class="circuit" d="M 350 320 V 270 H 400 V 240" />
  <path class="circuit" d="M 680 320 V 280 H 620 V 240" />

  <!-- Active Circuit Data Streams -->
  <path class="circuit-active" d="M -20 100 H 120 V 120 H 210" />
  <path class="circuit-active-slow" d="M 280 -20 V 40 H 320 V 60" />
  <path class="circuit-active" d="M 1020 150 H 850 V 170 H 790" />
  <path class="circuit-active-slow" d="M 680 320 V 280 H 620 V 240" />
  <path class="circuit-active" d="M -20 220 H 90 V 200 H 210" />
  <path class="circuit-active-slow" d="M 1020 90 H 880 V 120 H 790" />

  <!-- Circuit Nodes -->
  <g>
    <!-- Left -->
    <circle cx="120" cy="100" r="3" class="node" />
    <circle cx="120" cy="120" r="3" class="node" />
    <circle cx="150" cy="160" r="3" class="node" />
    <circle cx="150" cy="180" r="3" class="node" />
    <circle cx="90" cy="220" r="3" class="node" />
    <circle cx="90" cy="200" r="3" class="node" />
    <!-- Top -->
    <circle cx="280" cy="40" r="3" class="node" />
    <circle cx="320" cy="40" r="3" class="node" />
    <circle cx="650" cy="50" r="3" class="node" />
    <circle cx="700" cy="50" r="3" class="node" />
    <!-- Right -->
    <circle cx="880" cy="90" r="3" class="node" />
    <circle cx="880" cy="120" r="3" class="node" />
    <circle cx="850" cy="150" r="3" class="node" />
    <circle cx="850" cy="170" r="3" class="node" />
    <circle cx="920" cy="210" r="3" class="node" />
    <circle cx="920" cy="190" r="3" class="node" />
    <!-- Bottom -->
    <circle cx="350" cy="270" r="3" class="node" />
    <circle cx="400" cy="270" r="3" class="node" />
    <circle cx="680" cy="280" r="3" class="node" />
    <circle cx="620" cy="280" r="3" class="node" />
  </g>

  <!-- Pulsing Activity Core Nodes on the Motherboard -->
  <g>
    <circle cx="120" cy="120" r="2" class="node-pulse"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="40" r="2" class="node-pulse"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="170" r="2" class="node-pulse"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="280" r="2" class="node-pulse"><animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Inner CPU Glow Layer (Animated) -->
  <rect x="220" y="70" width="560" height="160" fill="none" stroke="#0ea5e9" stroke-width="4" rx="8" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0; 0.6; 0" dur="5s" repeatCount="indefinite" />
  </rect>

  <!-- Typography -->
  <g transform="translate(500, 150)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8">SIHAN UDAYARATNA</text>
    
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle" letter-spacing="12">AI &amp; MACHINE LEARNING ENGINEER</text>
    
    <!-- Central decorative scanning line -->
    <rect x="-240" y="55" width="480" height="2" fill="url(#cyan-glow)">
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
