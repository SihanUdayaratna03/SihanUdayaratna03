<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Deep sleek background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- AI Cyan to Purple Gradient -->
    <linearGradient id="ai-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <!-- Matrix Grid (Representing Tensors/Data) -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#3b82f6" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="1000" height="300" fill="url(#bg)" />
  <rect width="1000" height="300" fill="url(#grid)" />

  <!-- Neural Net Synapses (Lines) -->
  <g stroke="url(#ai-glow)" stroke-width="1.5" opacity="0.3">
    <!-- Layer 1 to Layer 2 -->
    <path d="M 150 100 L 300 70 M 150 100 L 300 150 M 150 100 L 300 230 
             M 150 200 L 300 70 M 150 200 L 300 150 M 150 200 L 300 230" />
    <!-- Layer 2 to Layer 3 -->
    <path d="M 300 70 L 500 50 M 300 70 L 500 250
             M 300 150 L 500 50 M 300 150 L 500 250
             M 300 230 L 500 50 M 300 230 L 500 250" />
    <!-- Layer 3 to Layer 4 -->
    <path d="M 500 50 L 700 70 M 500 50 L 700 150 M 500 50 L 700 230
             M 500 250 L 700 70 M 500 250 L 700 150 M 500 250 L 700 230" />
    <!-- Layer 4 to Layer 5 -->
    <path d="M 700 70 L 850 100 M 700 70 L 850 200
             M 700 150 L 850 100 M 700 150 L 850 200
             M 700 230 L 850 100 M 700 230 L 850 200" />
  </g>

  <!-- Animated Data Packets flowing through Synapses -->
  <g fill="#2dd4bf" filter="url(#glow)">
    <circle r="3.5">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 150 100 L 300 70 L 500 50 L 700 70 L 850 100" />
    </circle>
    <circle r="3.5" fill="#a855f7">
      <animateMotion dur="5s" repeatCount="indefinite" path="M 150 200 L 300 230 L 500 250 L 700 230 L 850 200" />
    </circle>
    <circle r="3.5" fill="#3b82f6">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M 850 200 L 700 150 L 500 50 L 300 150 L 150 100" />
    </circle>
    <circle r="3.5">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M 150 100 L 300 150 L 500 250 L 700 150 L 850 100" />
    </circle>
    <circle r="3.5" fill="#a855f7">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 150 200 L 300 150 L 500 50 L 700 230 L 850 100" />
    </circle>
    <circle r="3.5" fill="#3b82f6">
      <animateMotion dur="5.5s" repeatCount="indefinite" path="M 850 100 L 700 70 L 500 250 L 300 230 L 150 200" />
    </circle>
  </g>

  <!-- Neural Nodes (Dots) -->
  <g fill="#1e293b" stroke="url(#ai-glow)" stroke-width="2.5">
    <!-- Layer 1 -->
    <circle cx="150" cy="100" r="7" />
    <circle cx="150" cy="200" r="7" />
    <!-- Layer 2 -->
    <circle cx="300" cy="70" r="9" />
    <circle cx="300" cy="150" r="9" />
    <circle cx="300" cy="230" r="9" />
    <!-- Layer 3 (Center - Pulses) -->
    <circle cx="500" cy="50" r="11" filter="url(#glow)">
      <animate attributeName="r" values="11; 14; 11" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="250" r="11" filter="url(#glow)">
      <animate attributeName="r" values="11; 14; 11" dur="3s" repeatCount="indefinite" />
    </circle>
    <!-- Layer 4 -->
    <circle cx="700" cy="70" r="9" />
    <circle cx="700" cy="150" r="9" />
    <circle cx="700" cy="230" r="9" />
    <!-- Layer 5 -->
    <circle cx="850" cy="100" r="7" />
    <circle cx="850" cy="200" r="7" />
  </g>

  <!-- Foreground Typography -->
  <text x="500" y="148" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6" filter="url(#text-shadow)">SIHAN UDAYARATNA</text>
  <text x="500" y="182" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2dd4bf" text-anchor="middle" letter-spacing="8" filter="url(#text-shadow)">AI &amp; MACHINE LEARNING ENGINEER</text>

</svg>
